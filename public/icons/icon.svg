<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0f172a" />
      <stop offset="100%" stop-color="#020617" />
    </radialGradient>
    <linearGradient id="metal-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569" />
      <stop offset="50%" stop-color="#1e293b" />
      <stop offset="100%" stop-color="#0f172a" />
    </linearGradient>
    <linearGradient id="emerald-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />
  
  <!-- Outer Ring (Safe Door) -->
  <rect x="96" y="96" width="320" height="320" rx="40" fill="url(#metal-grad)" stroke="#10b981" stroke-width="4" />
  
  <!-- Safe Dial Outer -->
  <circle cx="256" cy="256" r="90" fill="#0f172a" stroke="#334155" stroke-width="8" />
  
  <!-- Safe Dial Inner -->
  <circle cx="256" cy="256" r="60" fill="url(#metal-grad)" />
  
  <!-- Safe Dial Spokes / Details -->
  <line x1="256" y1="166" x2="256" y2="196" stroke="#10b981" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
  <line x1="256" y1="316" x2="256" y2="346" stroke="#10b981" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
  <line x1="166" y1="256" x2="196" y2="256" stroke="#10b981" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
  <line x1="316" y1="256" x2="346" y2="256" stroke="#10b981" stroke-width="6" stroke-linecap="round" filter="url(#glow)" />
  
  <!-- Central Lock Dial -->
  <circle cx="256" cy="256" r="24" fill="#020617" stroke="#10b981" stroke-width="4" filter="url(#glow)" />
  
  <!-- Tech-style scrapper details/lines -->
  <path d="M 120 120 L 160 120 M 120 120 L 120 160" stroke="#10b981" stroke-width="4" stroke-linecap="round" />
  <path d="M 392 120 L 352 120 M 392 120 L 392 160" stroke="#10b981" stroke-width="4" stroke-linecap="round" />
  <path d="M 120 392 L 160 392 M 120 392 L 120 352" stroke="#10b981" stroke-width="4" stroke-linecap="round" />
  <path d="M 392 392 L 352 392 M 392 392 L 392 352" stroke="#10b981" stroke-width="4" stroke-linecap="round" />
</svg>
